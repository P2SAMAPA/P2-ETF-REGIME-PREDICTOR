name: Manual Retrain — P2-ETF-REGIME-PREDICTOR

# IMPORTANT — one-time action after deploying v4:
# Trigger this workflow with force_retrain=true (the default).
# This wipes the old HF parquet (keyed by train_start) and rebuilds
# using the new expanding-window schema (keyed by test_year).
# After this run the dropdown will show test years 2012–2025 with
# genuinely different OOS signals for each year.
#
# Estimated runtimes (GitHub free tier):
#   full-train-a/b     ~30-35 min each
#   wf-sweep-a/b       ~80-100 min each
# Total: ~2-3 hours

on:
  schedule:
    - cron: '0 3 * * 1'   # Monday 03:00 UTC weekly rebuild
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Wipe existing WF predictions and retrain all folds (true/false)'
        required: false
        default: 'true'
      force_refresh:
        description: 'Rebuild dataset from yfinance + FRED APIs (true/false)'
        required: false
        default: 'false'

jobs:

  retrain-full-a:
    name: Full Retrain — Option A (FI/Commodities)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full retrain Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          CMD="python train_hf.py --option a"
          [ "${{ github.event.inputs.force_retrain }}" != "false" ] && CMD="$CMD --force-retrain"
          [ "${{ github.event.inputs.force_refresh }}" = "true"  ] && CMD="$CMD --force-refresh"
          echo "Running: $CMD"
          $CMD

  retrain-full-b:
    name: Full Retrain — Option B (Equity ETFs)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full retrain Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          CMD="python train_hf.py --option b"
          [ "${{ github.event.inputs.force_retrain }}" != "false" ] && CMD="$CMD --force-retrain"
          [ "${{ github.event.inputs.force_refresh }}" = "true"  ] && CMD="$CMD --force-refresh"
          echo "Running: $CMD"
          $CMD

  sweep-a:
    name: Sweep — Option A
    runs-on: ubuntu-latest
    timeout-minutes: 300
    needs: retrain-full-a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Consensus sweep Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option a --sweep

  sweep-b:
    name: Sweep — Option B
    runs-on: ubuntu-latest
    timeout-minutes: 300
    needs: retrain-full-b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Consensus sweep Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option b --sweep
