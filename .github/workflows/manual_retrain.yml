name: Manual Retrain P2-ETF-REGIME-PREDICTOR

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force full dataset rebuild from scratch'
        required: false
        default: 'true'
      run_wfcv:
        description: 'Run walk-forward CV (takes ~3 hours)'
        required: false
        default: 'false'
      sweep_mode:
        description: 'Run in sweep mode (for multi-year consensus)'
        required: false
        default: 'false'
      start_year:
        description: 'Start year for sweep mode (e.g., 2008, 2013, 2015)'
        required: false
        default: ''

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Retrain
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_refresh }}" == "true" ]; then
            ARGS="$ARGS --force-refresh"
          fi
          if [ "${{ github.event.inputs.run_wfcv }}" == "true" ]; then
            ARGS="$ARGS --wfcv"
          fi
          if [ "${{ github.event.inputs.sweep_mode }}" == "true" ]; then
            ARGS="$ARGS --sweep-mode"
          fi
          if [ -n "${{ github.event.inputs.start_year }}" ]; then
            ARGS="$ARGS --start-year ${{ github.event.inputs.start_year }}"
          fi
          python train_hf.py $ARGS
