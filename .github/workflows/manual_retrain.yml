name: Manual Retrain — P2-ETF-REGIME-PREDICTOR

on:
  schedule:
    # Runs daily at 03:00 UTC (11 PM ET) — after daily pipeline completes
    - cron: '0 3 * * 1-5'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force full dataset rebuild from source APIs'
        required: false
        default: 'false'
      option:
        description: 'Which option to retrain: a, b, or both'
        required: false
        default: 'both'

jobs:

  retrain-option-a:
    name: Retrain Option A — FI/Commodities
    runs-on: ubuntu-latest
    timeout-minutes: 240
    # Skip Option A job if manual trigger specifies option=b
    if: ${{ github.event.inputs.option != 'b' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full retrain Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force_refresh }}" == "true" ]; then
            FORCE="--force-refresh"
          fi

          echo "=== Option A: Full Training ==="
          python train_hf.py --option a $FORCE

          echo "=== Option A: Full Walk-Forward CV (all folds) ==="
          python train_hf.py --option a --wfcv $FORCE

          echo "=== Option A: Consensus Sweep ==="
          python train_hf.py --option a --sweep $FORCE

  retrain-option-b:
    name: Retrain Option B — Equity ETFs
    runs-on: ubuntu-latest
    timeout-minutes: 240
    # Skip Option B job if manual trigger specifies option=a
    if: ${{ github.event.inputs.option != 'a' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full retrain Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force_refresh }}" == "true" ]; then
            FORCE="--force-refresh"
          fi

          echo "=== Option B: Full Training ==="
          python train_hf.py --option b $FORCE

          echo "=== Option B: Full Walk-Forward CV (all folds) ==="
          python train_hf.py --option b --wfcv $FORCE

          echo "=== Option B: Consensus Sweep ==="
          python train_hf.py --option b --sweep $FORCE
