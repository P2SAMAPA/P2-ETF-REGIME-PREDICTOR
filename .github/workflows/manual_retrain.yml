# manual_retrain.yml
# Triggered manually for full rebuilds or diagnostics

name: Manual Retrain

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force full dataset rebuild from scratch"
        required: true
        default: "true"
        type: boolean
      run_wfcv:
        description: "Run walk-forward cross-validation"
        required: false
        default: "true"
        type: boolean
      start_year:
        description: "Start year for dataset (default 2008)"
        required: false
        default: "2008"
        type: string

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN }}
      GITLAB_REPO_URL:  ${{ secrets.GITLAB_REPO_URL }}
      FRED_API_KEY:     ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full retrain
        run: |
          ARGS="--force-refresh"
          if [ "${{ github.event.inputs.run_wfcv }}" = "true" ]; then
            ARGS="$ARGS --wfcv"
          fi
          python train.py $ARGS

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 30
