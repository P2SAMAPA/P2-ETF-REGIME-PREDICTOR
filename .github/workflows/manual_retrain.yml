name: Manual Retrain — P2-ETF-REGIME-PREDICTOR

# Trigger manually or on schedule.
# Use force_retrain=true (default) to wipe the stale wf parquet and
# recompute all windows from scratch — required any time models.py changes.

on:
  schedule:
    - cron: '0 3 * * 1-5'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Wipe existing wf predictions and retrain all windows (true/false)'
        required: false
        default: 'true'

jobs:

  # ── Job 1: Full retrain Option A ──────────────────────────────────────────
  retrain-full-a:
    name: Full Retrain — Option A (FI/Commodities)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full retrain Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          RETRAIN="${{ github.event.inputs.force_retrain }}"
          if [ "$RETRAIN" = "true" ] || [ -z "$RETRAIN" ]; then
            python train_hf.py --option a --force-retrain
          else
            python train_hf.py --option a
          fi

  # ── Job 2: Full retrain Option B ──────────────────────────────────────────
  retrain-full-b:
    name: Full Retrain — Option B (Equity ETFs)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full retrain Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          RETRAIN="${{ github.event.inputs.force_retrain }}"
          if [ "$RETRAIN" = "true" ] || [ -z "$RETRAIN" ]; then
            python train_hf.py --option b --force-retrain
          else
            python train_hf.py --option b
          fi

  # ── Job 3: WF CV + sweep Option A ─────────────────────────────────────────
  retrain-wf-sweep-a:
    name: WF + Sweep — Option A (FI/Commodities)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    needs: retrain-full-a   # wait for full retrain to finish first

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: WF CV Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          RETRAIN="${{ github.event.inputs.force_retrain }}"
          if [ "$RETRAIN" = "true" ] || [ -z "$RETRAIN" ]; then
            python train_hf.py --option a --wfcv --force-retrain
          else
            python train_hf.py --option a --wfcv
          fi
      - name: Consensus sweep Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option a --sweep

  # ── Job 4: WF CV + sweep Option B ─────────────────────────────────────────
  retrain-wf-sweep-b:
    name: WF + Sweep — Option B (Equity ETFs)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    needs: retrain-full-b   # wait for full retrain to finish first

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: WF CV Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          RETRAIN="${{ github.event.inputs.force_retrain }}"
          if [ "$RETRAIN" = "true" ] || [ -z "$RETRAIN" ]; then
            python train_hf.py --option b --wfcv --force-retrain
          else
            python train_hf.py --option b --wfcv
          fi
      - name: Consensus sweep Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option b --sweep
