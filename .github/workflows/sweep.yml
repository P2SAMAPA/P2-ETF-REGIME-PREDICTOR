name: Multi-Year Consensus Sweep

on:
  schedule:
    # Run at 1:00 AM EST (6:00 AM UTC) daily
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      sweep_years:
        description: 'Comma-separated years to sweep (e.g., 2008,2013,2015)'
        required: false
        default: '2008,2013,2015,2017,2019,2021'

jobs:
  sweep-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        year: ${{ fromJson(format('[{0}]', github.event.inputs.sweep_years || '2008,2013,2015,2017,2019,2021')) }}
      fail-fast: false
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Sweep for Year ${{ matrix.year }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python train_hf.py --sweep-mode --start-year ${{ matrix.year }}
