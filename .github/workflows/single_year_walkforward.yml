name: Single‑Year Walk‑Forward

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Test year (e.g., 2015)'
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run single‑year walk‑forward
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --single-year ${{ github.event.inputs.year }}
