name: Daily Pipeline — P2-ETF-REGIME-PREDICTOR

# Estimated runtimes (free tier):
#   full-train-a:  ~30 min  (incremental, only new windows)
#   full-train-b:  ~35 min
#   wf-sweep-a:    ~80 min  (incremental, fixed_k from saved detector)
#   wf-sweep-b:    ~100 min
# Jobs 3 & 4 wait for Jobs 1 & 2 to finish (needs:) so the saved
# detector/ranker exists before the WF sweep reads it.

on:
  schedule:
    # Mon–Fri at 22:30 UTC (6:30 PM ET, after market close + buffer)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:

  # ── Job 1: Full train Option A (live signal) ────────────────────────────────
  full-train-a:
    name: Full Train — Option A (FI/Commodities)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full train Option A (incremental)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option a

  # ── Job 2: Full train Option B (live signal) ────────────────────────────────
  full-train-b:
    name: Full Train — Option B (Equity ETFs)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full train Option B (incremental)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option b

  # ── Job 3: WF CV + sweep Option A ──────────────────────────────────────────
  wf-sweep-a:
    name: WF + Sweep — Option A (FI/Commodities)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    needs: full-train-a

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Incremental WF CV Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option a --wfcv
      - name: Consensus sweep Option A
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option a --sweep

  # ── Job 4: WF CV + sweep Option B ──────────────────────────────────────────
  wf-sweep-b:
    name: WF + Sweep — Option B (Equity ETFs)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    needs: full-train-b

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Incremental WF CV Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option b --wfcv
      - name: Consensus sweep Option B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python train_hf.py --option b --sweep
