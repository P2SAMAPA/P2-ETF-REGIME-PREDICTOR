name: Daily Pipeline P2-ETF-REGIME-PREDICTOR (HF Dataset)

on:
  schedule:
    # Runs at 11:30 UTC (6:30 AM EST) every weekday
    - cron: '30 11 * * 1-5'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force full dataset rebuild'
        required: false
        default: 'false'
      run_wfcv:
        description: 'Run walk-forward CV after training'
        required: false
        default: 'false'

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Daily Pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python train_hf.py             ${{ github.event.inputs.force_refresh == 'true' && '--force-refresh' || '' }}             ${{ github.event.inputs.run_wfcv == 'true' && '--wfcv' || '' }}

  walk-forward-cv:
    runs-on: ubuntu-latest
    if: github.event.inputs.run_wfcv == 'true' || github.event.schedule == '0 0 1 * *'
    needs: daily-pipeline
    timeout-minutes: 180

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Walk-Forward CV
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python train_hf.py --wfcv-only
