name: Daily Pipeline — P2-ETF-REGIME-PREDICTOR

on:
  schedule:
    # Runs Mon–Fri at 22:30 UTC (6:30 PM ET, after market close + buffer)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:  # allow manual trigger anytime

jobs:

  pipeline-option-a:
    name: Option A — FI/Commodities
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full train + incremental WF + sweep (Option A)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          echo "=== Option A: Full Training ==="
          python train_hf.py --option a

          echo "=== Option A: Incremental Walk-Forward CV ==="
          python train_hf.py --option a --wfcv

          echo "=== Option A: Consensus Sweep ==="
          python train_hf.py --option a --sweep

  pipeline-option-b:
    name: Option B — Equity ETFs
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full train + incremental WF + sweep (Option B)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          echo "=== Option B: Full Training ==="
          python train_hf.py --option b

          echo "=== Option B: Incremental Walk-Forward CV ==="
          python train_hf.py --option b --wfcv

          echo "=== Option B: Consensus Sweep ==="
          python train_hf.py --option b --sweep
